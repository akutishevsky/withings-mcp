sonar.organization=akutishevsky
sonar.projectKey=akutishevsky_withings-mcp

# Exclude SQL migrations and test files from copy-paste (duplication) detection
# only. Both are still scanned for real issues; only the duplication metric
# ignores them.
#
# Migrations are immutable, append-only history. When a Postgres function needs
# a change, the only mechanism is CREATE OR REPLACE FUNCTION, which necessarily
# restates the whole body — 009 duplicates 008 to add a three-line clamp. That
# is inherent to how migrations work, not a maintainability defect, and it
# cannot be refactored away without breaking the guarantee that an applied
# migration never changes.
#
# Test files deliberately repeat fixture and assertion patterns; similarity
# among them is expected structure, not a maintainability signal.
sonar.cpd.exclusions=supabase/migrations/**,tests/**
